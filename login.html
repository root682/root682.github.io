<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            color: #ff0000;
        }
        form {
            width: 300px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #1900ff;
            border-radius: 5px;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #007BFF;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Iniciar Sesión</h1>
    <form id="loginForm">
        <label for="username">Nombre de usuario:</label>
        <input type="text" id="username" required>
        <br>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" required>
        <br>
        <button type="submit">Iniciar Sesión</button>
    </form>
    
    <p>¿No tienes una cuenta? <a href="Register.html">Regístrate aquí</a></p>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            
        });
    </script>
</body>
</html>

       <html>
      <head>
    <title>Recuperar Cuenta</title>
    <style>

    </style>
</head>
<body>
    <h1>Recuperar Cuenta</h1>
    <form id="recoverForm">
        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" required>
        <p id="mensajeRecuperacion" class="error"></p>
        <button type="button" onclick="enviarEnlaceRecuperacion()">Enviar Enlace de Recuperación</button>
    </form>

    <script>
        function enviarEnlaceRecuperacion() {
            const email = document.getElementById("email").value;
            const mensajeRecuperacion = document.getElementById("mensajeRecuperacion");

            // Validar el correo electrónico (puedes agregar una validación más robusta)
            if (!email || !email.includes('@')) {
                mensajeRecuperacion.textContent = "Correo electrónico no válido";
                return;
            }

            // Aquí deberías agregar la lógica para verificar si el correo electrónico existe en tu sistema y, si es así, generar y enviar un enlace de recuperación.
            
            // Simulación de éxito
            mensajeRecuperacion.textContent = "Se ha enviado un enlace de recuperación a su correo electrónico";
            
            // Redirige al usuario a la página de inicio de sesión después de un breve retraso
            setTimeout(function() {
                window.location.href = 'iniciar_sesion.html';
            }, 3000);
        }
    </script>
</body>
</html>
